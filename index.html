<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description"
		content="Link in bio page for Artem, Web Developer with links to socials, offers, and promotions.">
	<title>Link in Bio</title>
	<link rel="icon" href="img/favicon.ico" type="image/x-icon">
	<link rel="icon" href="img/favicon.png" type="image/png">
	<link rel="apple-touch-icon" href="img/apple-touch-icon.png">
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<div class="container">

		<header class="header">
			<div class="theme-controls">
				<button id="theme-toggle" class="theme-btn">
					Dark Mode
				</button>
			</div>

			<img class="profile-pic" src="img/profile-pic.png" alt="Profile Picture">

			<h1>Artem | Web Developer</h1>

			<div class="status-container">
				<span id="status-dot" class="dot"></span>
				<span id="status-text">Checking status...</span>
			</div>

			<div class="profile-bio">
				<p>Welcome! I'm a passionate web developer focused on creating fast, modern, and user-friendly websites.</p>
				<p>Check out my curated links for tutorials, tools, and exclusive offers — everything I personally recommend.
				</p>
			</div>
		</header>

		<div class="social-links"></div>

		<section class="promotions">
			<div class="promo-container"></div>
		</section>

		<section class="faq"></section>
	</div>

	<script src="script.js"></script>
</body>

</html>
